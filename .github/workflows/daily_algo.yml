name: Daily Algorithm Publish

on:
  schedule:
    - cron: "0 3 * * *" # 매일 KST 12:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish-one:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Git identity (noreply)
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Pick next unpublished bundle
        id: pick
        shell: bash
        run: |
          mkdir -p algorithms

          NEXT_NUM=""

          for file in $(find pending -maxdepth 1 -type f \( -name "*.swift" -o -name "*.md" -o -name "*.py" \) | sort); do
            BASENAME=$(basename "$file")
            NUM="${BASENAME%%.*}"

            ALREADY_PUBLISHED=0

            for ext in swift md py; do
              if [ -f "algorithms/${NUM}.${ext}" ]; then
                ALREADY_PUBLISHED=1
                break
              fi
            done

            if [ "$ALREADY_PUBLISHED" -eq 0 ]; then
              NEXT_NUM="$NUM"
              break
            fi
          done

          if [ -z "$NEXT_NUM" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "NUM=$NEXT_NUM" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Move, commit, push
        if: steps.pick.outputs.found == 'true'
        shell: bash
        run: |
          NUM="${{ steps.pick.outputs.NUM }}"
          MOVED=0

          for ext in swift md py; do
            SRC="pending/${NUM}.${ext}"
            DEST="algorithms/${NUM}.${ext}"

            if [ -f "$SRC" ]; then
              git mv "$SRC" "$DEST"
              MOVED=1
            fi
          done

          if [ "$MOVED" -eq 0 ]; then
            echo "No files moved for #$NUM"
            exit 0
          fi

          git add algorithms pending

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "feat(algo): publish #${NUM}"
          git push
