name: Daily Algorithm Publish

on:
  schedule:
    - cron: "0 3 * * *" # 매일 KST 12:00 (UTC 03:00)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish-one:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Git identity (noreply)
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Pick next pending bundle
        id: pick
        shell: bash
        run: |
          mkdir -p algorithms

          # pending 폴더에서 허용 확장자 중 가장 앞 번호의 파일 1개를 찾음
          NEXT_FILE=$(find pending -maxdepth 1 -type f \( -name "*.py" -o -name "*.swift" -o -name "*.md" \) | sort | head -n 1 || true)

          if [ -z "$NEXT_FILE" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASENAME=$(basename "$NEXT_FILE")   # ex: 1543.swift
          NUM="${BASENAME%%.*}"               # ex: 1543

          echo "NUM=$NUM" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Move, commit, push
        if: steps.pick.outputs.found == 'true'
        shell: bash
        run: |
          NUM="${{ steps.pick.outputs.NUM }}"
          MOVED=0

          for ext in swift md py; do
            SRC="pending/${NUM}.${ext}"
            DEST="algorithms/${NUM}.${ext}"

            if [ -f "$SRC" ]; then
              git mv "$SRC" "$DEST"
              MOVED=1
            fi
          done

          if [ "$MOVED" -eq 0 ]; then
            echo "No files moved for #$NUM"
            exit 0
          fi

          git add algorithms
          git commit -m "feat(algo): publish #${NUM}"
          git push
